services:
  db:
    image: mariadb:11
    container_name: bai3_mono_db
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: bai3db
      MARIADB_USER: demo
      MARIADB_PASSWORD: demo123
    ports:
      - "3307:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: bai3_mono_backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: demo
      DB_PASSWORD: demo123
      DB_NAME: bai3db
      PORT: 5000
    depends_on:
      - db
    ports:
      - "5000:5000"

  frontend:
    image: nginx:alpine
    container_name: bai3_mono_frontend
    depends_on:
      - backend
    ports:
      - "8088:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
